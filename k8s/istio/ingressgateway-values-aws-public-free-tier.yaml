labels:
  istio: ingressgateway

replicaCount: 1

autoscaling:
  enabled: false

service:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  ports:
    - name: status-port
      port: 15021
      protocol: TCP
      targetPort: 15021
    - name: http2
      port: 80
      protocol: TCP
      targetPort: 80
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
      
resources:
  requests:
    cpu: 10m
    memory: 48Mi
  limits:
    cpu: 200m
    memory: 192Mi
